<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>搜索记录</title><link rel="stylesheet" href="css/reset.css"><link rel="stylesheet" href="css/common.css"></head>
<body data-page-id="search" data-required-level="0" data-is-hidden="false">
  <div id="app-header"></div>
  <main class="main-content">
    <section class="card">
      <h2>检索结果</h2>
      <div id="result-box"></div>
    </section>
    <section class="card">
      <h2>检索记录</h2>
      <div id="search-history"></div>
    </section>
  </main>
  <div id="app-footer"></div>
  <script src="js/utils/storage.js"></script><script src="data/index.js"></script><script src="js/core/game-state.js"></script><script src="js/core/story-data.js"></script><script src="js/core/search-engine.js"></script><script src="js/core/account-manager.js"></script><script src="js/core/router.js"></script><script src="js/components/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Layout.init('搜索记录');
      const params = new URLSearchParams(location.search);
      const q = params.get('q');
      const type = params.get('type');
      const box = document.getElementById('result-box');
      if (params.get('locked')) {
        box.innerHTML = '<div class="permission-denied">档案索引未开放。</div>';
      } else if (!q) {
        box.innerHTML = '<p class="muted">输入人名、课程术语或档案词条开始搜索。</p>';
      } else if (type === 'blocked') {
        box.innerHTML = `<div class="permission-denied">你搜索了“${Layout.escape(q)}”，但该档案需要 Lv${params.get('required')} 权限。</div>`;
      } else if (type === 'fuzzy') {
        box.innerHTML = `<p>“${Layout.escape(q)}”存在近似记录。</p>`;
      } else if (type === 'none') {
        box.innerHTML = `<p>“${Layout.escape(q)}”未匹配公开索引。</p>`;
      } else {
        box.innerHTML = '<p class="muted">检索完成。</p>';
      }
      Layout.renderSearchHistory('search-history');
    });
  </script>
</body>
</html>
