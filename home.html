<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新生主页 - 酆都在线学院</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/common.css">
</head>
<body data-page-id="home" data-required-level="0" data-is-hidden="false">
  <div id="app-header"></div>
  <main class="main-content">
    <section class="card" id="register-card">
      <h2>新生入学认证</h2>
      <p class="muted">系统显示你已经被预录取。完成认证后，你可以查看课程、学生名单和退学流程。</p>
      <div class="login-panel">
        <div class="form-group">
          <label for="playerName">昵称</label>
          <input id="playerName" maxlength="12" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="playerBirthday">自设生日密码</label>
          <input id="playerBirthday" maxlength="8" autocomplete="off" placeholder="MMDD 或 YYYYMMDD">
          <p class="muted">这是你的新生账号密码。系统说它只用于身份确认。</p>
        </div>
        <button class="btn-primary" id="registerBtn">确认入学</button>
        <p id="registerMsg" class="modal-hint"></p>
      </div>
    </section>

    <section class="card" id="dashboard-card" style="display:none;">
      <h2>当前目标：找到退学入口</h2>
      <p class="muted">欢迎回来，<span id="dashName"></span>。主页的退学按钮始终显示维护中，你需要从课程、学生名单和搜索记录里弄清自己为什么被录取。</p>
      <div class="action-grid">
        <a class="action-card" href="courses.html"><strong>课程中心</strong><br><span class="muted">查看异常课程描述</span></a>
        <a class="action-card" href="students.html"><strong>学生名单</strong><br><span class="muted">从人物主页调查陈雨桐</span></a>
        <a class="action-card" href="search.html?q=退学"><strong>退学入口</strong><br><span class="muted">系统会记录你的尝试</span></a>
        <a class="action-card" href="login.html"><strong>已有账号登录</strong><br><span class="muted">切换到你找到的账号</span></a>
      </div>
    </section>

    <section class="card">
      <h2>搜索记录</h2>
      <div id="home-history"></div>
    </section>
  </main>
  <div id="app-footer"></div>
  <script src="js/utils/storage.js"></script>
  <script src="data/index.js"></script>
  <script src="js/core/game-state.js"></script>
  <script src="js/core/story-data.js"></script>
  <script src="js/core/search-engine.js"></script>
  <script src="js/core/account-manager.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/components/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Layout.init('新生主页');
      const state = GameState.getState();
      const registerCard = document.getElementById('register-card');
      const dashboardCard = document.getElementById('dashboard-card');
      if (state.playerName) {
        registerCard.style.display = 'none';
        dashboardCard.style.display = 'block';
        document.getElementById('dashName').textContent = state.playerName;
      }
      Layout.renderSearchHistory('home-history');
    });
    document.getElementById('registerBtn').addEventListener('click', () => {
      const name = document.getElementById('playerName').value.trim();
      const birthday = document.getElementById('playerBirthday').value.trim();
      const msg = document.getElementById('registerMsg');
      if (!name || !/^\d{4}$|^\d{8}$/.test(birthday)) {
        msg.textContent = '请填写昵称，并输入 4 位或 8 位生日密码。';
        msg.className = 'modal-hint error';
        return;
      }
      GameState.setPlayer(name, birthday);
      window.location.reload();
    });
  </script>
</body>
</html>
