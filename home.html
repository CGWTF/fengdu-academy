<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新生主页 - 酆都在线学院</title>
  <link rel="stylesheet" href="css/reset.css?v=20260624-student-records">
  <link rel="stylesheet" href="css/common.css?v=20260624-student-records">
</head>
<body data-page-id="home" data-required-level="0" data-is-hidden="false">
  <div id="app-header"></div>
  <main class="main-content">
    <section class="card" id="register-card">
      <h2>新生入学认证</h2>
      <p class="muted">系统显示你已经被预录取。请补全缺失字段以完成学籍写入。</p>
      <div class="login-panel">
        <div class="form-group">
          <label for="playerName">昵称</label>
          <input id="playerName" maxlength="12" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="playerBirthday">出生日期</label>
          <input id="playerBirthday" maxlength="8" autocomplete="off" placeholder="MMDD 或 YYYYMMDD">
          <p class="muted">用于学籍校验。提交后不可在公开页面修改。</p>
        </div>
        <button class="btn-primary" id="registerBtn">确认入学</button>
        <p id="registerMsg" class="modal-hint"></p>
      </div>
    </section>

    <section class="card" id="dashboard-card" style="display:none;">
      <h2>学生系统</h2>
      <p class="muted">欢迎回来，<span id="dashName"></span>。</p>
      <p class="status-line">学籍状态：<strong class="status-observation">观察期</strong></p>
      <div class="action-grid">
        <a class="action-card" href="courses.html"><strong>课程中心</strong><br><span class="muted">6 门课程可选</span></a>
        <a class="action-card" href="students.html"><strong>学生名单</strong><br><span class="muted">2025 级学籍总览</span></a>
        <a class="action-card" href="search.html?q=退学"><strong>退学申请</strong><br><span class="muted">状态：维护中</span></a>
      </div>
    </section>

    <section class="card">
      <h2>检索记录</h2>
      <div id="home-history"></div>
    </section>
  </main>
  <div id="app-footer"></div>
  <script src="js/utils/storage.js?v=20260624-student-records"></script>
  <script src="data/index.js?v=20260624-student-records"></script>
  <script src="js/core/game-state.js?v=20260624-student-records"></script>
  <script src="js/core/story-data.js?v=20260624-student-records"></script>
  <script src="js/core/search-engine.js?v=20260624-student-records"></script>
  <script src="js/utils/crypto.js?v=20260624-student-records"></script><script src="js/core/account-manager.js?v=20260624-student-records"></script>
  <script src="js/core/router.js?v=20260624-student-records"></script>
  <script src="js/components/layout.js?v=20260624-student-records"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Layout.init('新生主页');
      const state = GameState.getState();
      const registerCard = document.getElementById('register-card');
      const dashboardCard = document.getElementById('dashboard-card');
      if (state.playerName) {
        registerCard.style.display = 'none';
        dashboardCard.style.display = 'block';
        document.getElementById('dashName').textContent = state.playerName;
      }
      Layout.renderSearchHistory('home-history');
    });
    document.getElementById('registerBtn').addEventListener('click', () => {
      const name = document.getElementById('playerName').value.trim();
      const birthday = document.getElementById('playerBirthday').value.trim();
      const msg = document.getElementById('registerMsg');
      if (!name || !/^\d{4}$|^\d{8}$/.test(birthday)) {
        msg.textContent = '请填写昵称，并输入 4 位或 8 位日期。';
        msg.className = 'modal-hint error';
        return;
      }
      GameState.setPlayer(name, birthday);
      window.location.reload();
    });
  </script>
</body>
</html>
