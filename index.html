<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>酆都在线学院</title>
  <link rel="stylesheet" href="css/reset.css?v=20260624-student-records">
  <link rel="stylesheet" href="css/common.css?v=20260624-student-records">
</head>
<body data-page-id="index" data-required-level="0" data-is-hidden="false" class="entry-body">
  <main class="entry-page">
    <section class="entry-panel">
      <div class="entry-meta">
        <span>FENGDU ONLINE ACADEMY</span>
        <span id="timer">10 秒后可关闭</span>
      </div>
      <div class="entry-content">
        <p class="entry-kicker">系统通知</p>
        <h1>酆都在线学院</h1>
        <p>你的访问已被学籍系统接收。页面将在停留校验完成后开放关闭选项。</p>
      </div>
      <div class="entry-footer">
        <span>STATUS: VISITOR HOLD</span>
        <button class="entry-close" id="closeBtn" disabled>关闭</button>
      </div>
    </section>
  </main>
  <script>
    sessionStorage.removeItem('ad_passed');
    let seconds = 10;
    const timer = document.getElementById('timer');
    const closeBtn = document.getElementById('closeBtn');
    const tick = setInterval(() => {
      seconds -= 1;
      timer.textContent = seconds + ' 秒后可关闭';
      if (seconds <= 0) {
        clearInterval(tick);
        timer.textContent = '可关闭';
        closeBtn.disabled = false;
        closeBtn.classList.add('visible');
      }
    }, 1000);
    closeBtn.addEventListener('click', () => {
      closeBtn.textContent = '确认中';
      sessionStorage.setItem('ad_passed', '1');
      setTimeout(() => { window.location.href = 'home.html'; }, 500);
    });
  </script>
</body>
</html>
