<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>酆都在线学院</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/common.css">
</head>
<body data-page-id="index" data-required-level="0" data-is-hidden="false">
  <main class="main-content">
    <div class="video-ad-container">
      <div class="video-ad-screen">
        <div class="video-ad-timer" id="timer">10 秒后可关闭</div>
        <button class="video-ad-close" id="closeBtn" aria-label="关闭">X</button>
        <h1>酆都在线学院</h1>
        <p style="text-indent:0;margin-top:16px;">你收到了一份无法关闭的入学通知。</p>
        <p class="muted">系统正在确认访问者停留时间...</p>
      </div>
    </div>
  </main>
  <script>
    sessionStorage.removeItem('ad_passed');
    let seconds = 10;
    const timer = document.getElementById('timer');
    const closeBtn = document.getElementById('closeBtn');
    const tick = setInterval(() => {
      seconds -= 1;
      timer.textContent = seconds + ' 秒后可关闭';
      if (seconds <= 0) {
        clearInterval(tick);
        timer.textContent = '可关闭';
        closeBtn.classList.add('visible');
      }
    }, 1000);
    closeBtn.addEventListener('click', () => {
      closeBtn.textContent = '确认中';
      sessionStorage.setItem('ad_passed', '1');
      setTimeout(() => { window.location.href = 'home.html'; }, 500);
    });
  </script>
</body>
</html>
