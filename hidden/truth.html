<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>最终真相</title><link rel="stylesheet" href="../css/reset.css"><link rel="stylesheet" href="../css/common.css"></head>
<body data-page-id="truth" data-required-level="5" data-is-hidden="true">
  <div id="app-header"></div>
  <main class="main-content">
    <section class="card">
      <h2>你已被标记</h2>
      <p>你以为自己在调查陈雨桐。系统记录显示，你的搜索、登录路径和停留页面已经足够完成倾向判定。</p>
      <div class="record-card" id="profile"></div>
      <h3>搜索记录</h3>
      <div id="truth-history"></div>
    </section>
  </main>
  <div id="app-footer"></div>
  <script src="../js/utils/storage.js"></script><script src="../data/index.js"></script><script src="../js/core/game-state.js"></script><script src="../js/core/story-data.js"></script><script src="../js/core/search-engine.js"></script><script src="../js/core/account-manager.js"></script><script src="../js/core/router.js"></script><script src="../js/components/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded',()=> {
      Layout.init('最终真相','LvX');
      const s = GameState.getState();
      document.getElementById('profile').innerHTML = `
        昵称：${Layout.escape(s.playerName || '未登记')}<br>
        自设生日密码：${Layout.escape(s.playerBirthday || '未登记')}<br>
        账号路径：${s.accountsUsed.map(a => Layout.escape(a)).join(' -> ')}<br>
        浏览器：${Layout.escape(navigator.userAgent)}<br>
        屏幕：${screen.width} x ${screen.height}<br>
        语言/时区：${navigator.language} / ${Intl.DateTimeFormat().resolvedOptions().timeZone}
      `;
      Layout.renderSearchHistory('truth-history');
    });
  </script>
</body>
</html>
