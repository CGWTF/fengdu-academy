<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>最终真相</title>
  <link rel="stylesheet" href="../css/reset.css?v=20260624-student-records">
  <link rel="stylesheet" href="../css/common.css?v=20260624-student-records">
</head>
<body data-page-id="truth" data-required-level="5" data-is-hidden="true">
  <div id="app-header"></div>
  <main class="main-content">
    <section class="card truth-stage">
      <h2>系统核验</h2>
      <p class="muted">教师后台正在合并访问记录。请勿关闭页面。</p>
      <div class="scan-line" id="scanText">
        ACCESS LOG: loading...<br>
        SEARCH TRACE: loading...<br>
        VISITOR PROFILE: pending...
      </div>
    </section>
  </main>
  <div id="app-footer"></div>

  <div class="jumpscare-overlay" id="jumpscare">
    <div class="jumpscare-box">
      <div class="jumpscare-title">你已被标记</div>
      <div class="jumpscare-info" id="profile"></div>
    </div>
  </div>

  <script src="../js/utils/storage.js?v=20260624-student-records"></script>
  <script src="../data/index.js?v=20260624-student-records"></script>
  <script src="../js/core/game-state.js?v=20260624-student-records"></script>
  <script src="../js/core/story-data.js?v=20260624-student-records"></script>
  <script src="../js/core/search-engine.js?v=20260624-student-records"></script>
  <script src="../js/core/account-manager.js?v=20260624-student-records"></script>
  <script src="../js/core/router.js?v=20260624-student-records"></script>
  <script src="../js/components/layout.js?v=20260624-student-records"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Layout.init('系统核验', 'LvX');
      const s = GameState.getState();
      const history = s.searchHistory.slice(-6).map(item => item.keyword).join(' / ') || '无';
      const profile = `
        访问者昵称：${Layout.escape(s.playerName || '未登记')}<br>
        你提交过的日期：${Layout.escape(s.playerBirthday || '未登记')}<br>
        账号路径：${s.accountsUsed.map(a => Layout.escape(a)).join(' -> ')}<br>
        搜索倾向：${Layout.escape(history)}<br>
        浏览器：${Layout.escape(navigator.userAgent)}<br>
        屏幕：${screen.width} x ${screen.height}<br>
        语言/时区：${navigator.language} / ${Intl.DateTimeFormat().resolvedOptions().timeZone}
      `;

      const scanText = document.getElementById('scanText');
      setTimeout(() => {
        scanText.innerHTML = 'ACCESS LOG: matched<br>SEARCH TRACE: matched<br>VISITOR PROFILE: locked<br>MARK STATUS: pending...';
      }, 1200);
      setTimeout(() => {
        document.getElementById('profile').innerHTML = profile;
        document.getElementById('jumpscare').classList.add('show');
      }, 3200);
    });
  </script>
</body>
</html>
