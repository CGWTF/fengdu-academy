<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程中心 - 酆都在线学院</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/common.css">
</head>
<body data-page-id="courses" data-required-level="0" data-is-hidden="false">
  <div id="app-header"></div>
  <main class="main-content">
    <section class="card">
      <h2>课程中心</h2>
      <p class="muted">课程描述里有一些重复出现的术语。系统不会告诉你哪些词值得搜索。</p>
      <div class="action-grid" id="course-list"></div>
    </section>
  </main>
  <div id="app-footer"></div>
  <script src="js/utils/storage.js"></script>
  <script src="data/index.js"></script>
  <script src="js/core/game-state.js"></script>
  <script src="js/core/story-data.js"></script>
  <script src="js/core/search-engine.js"></script>
  <script src="js/core/account-manager.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/components/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Layout.init('课程中心');
      document.getElementById('course-list').innerHTML = StoryData.getCourseList().map(course => `
        <a class="action-card" href="${course.url}">
          <strong>${course.id} · ${course.title}</strong><br>
          <span class="muted">${course.instructor}</span><br>
          <span>${course.description}</span>
        </a>
      `).join('');
    });
  </script>
</body>
</html>
