<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>课程中心 — 酆都在线学院</title><link rel="stylesheet" href="css/reset.css?v=20260625"><link rel="stylesheet" href="css/common.css?v=20260625"></head>
<body data-page-id="courses" data-required-level="0" data-is-hidden="false">
<div id="app-header"></div>
<main class="main-content">
<section class="card"><h2>课程中心</h2><p class="muted">本学期共开设6门课程。需达到对应等级方可选修。</p>
<div id="course-list"></div>
</section></main>
<div id="app-footer"></div>
<script src="js/utils/storage.js?v=20260625"></script><script src="data/index.js?v=20260625"></script><script src="js/core/game-state.js?v=20260625"></script><script src="js/core/story-data.js?v=20260625"></script><script src="js/core/search-engine.js?v=20260625"></script><script src="js/utils/crypto.js?v=20260625"></script><script src="js/core/account-manager.js?v=20260625"></script><script src="js/core/router.js?v=20260625"></script><script src="js/components/layout.js?v=20260625"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  Layout.init('课程中心');
  var lv=GameState.getState().level;
  var courses=StoryData.getCourseList();
  var html=courses.map(function(c){
    var locked=c.requiredLevel>lv;
    var cls=locked?'course-card locked':'course-card';
    return '<a class="'+cls+'" href="'+(locked?'#':c.url)+'"'+(locked?' onclick="alert(\'需要 Lv'+c.requiredLevel+' 才能选修此课程\');return false;"':'')+'>'+
      '<div class="course-header"><strong>'+c.id+' · '+c.title+'</strong><span class="level-tag lv'+c.requiredLevel+'">Lv'+c.requiredLevel+'</span></div>'+
      '<div class="course-meta">'+c.instructor+' | '+c.credits+'学分</div>'+
      '<div class="course-desc">'+c.description+'</div></a>';
  }).join('');
  document.getElementById('course-list').innerHTML=html;
});
</script>
</body></html>
